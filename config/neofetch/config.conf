print_info() {

    prin "$(color 6)─────────────$(color 7) Hardware $(color 6)─────────────"
    info " PC" title
    info " 󰢩 " model
    info "  " cpu
    info "  " memory
    info " 󰋊 " disk
    info "  " gpu
    info " 󰍹 " resolution
    info "  " battery
    prin ""
    prin "$(color 6)─────────────$(color 7) Software $(color 6)─────────────"
    info "  " distro
    info "  " kernel
    info "  " shell
    info "  " de
    info " 󱫋 " wm
    info "  " term
    info " 󰧨 " theme
    info " 󰧨 " wm_theme
    info "   " font
    info " 󰧨 " term_font
    prin ""
    prin "$(color 6)──────────$(color 7) Network $(color 6)──────────"
    info " 󱫋 Local IP " local_ip
    info "  Public IP " public_ip
    prin ""
    prin "$(color 6)──────────$(color 7) Age / Uptime / Update $(color 6)──────────"
    info "$(color 1) OS Age" install_date
    info "$(color 1)  " uptime
    info "$(color 1)  " packages
    prin ""

    # prin "$(color 8)└──────────────────────────────────────────┘"
    prin " "
    prin "​ ​​ ​​ ​​$(color 1)​ ​​ ​​$(color 2)​ ​​ ​​$(color 3)​ ​​ ​​$(color 4)​ ​​ ​​$(color 5)​ ​​ ​​$(color 6)​ ​​ ​​$(color 7)​ ​​ ​​$(color 8)​ ​​ ​​$(color 16)"

}

#    ░█▀█░█▀█░▀█▀░▀█▀░█▀█░█▀█░█▀▀
#    ░█░█░█▀▀░░█░░░█░░█░█░█░█░▀▀█
#    ░▀▀▀░▀░░░░▀░░▀▀▀░▀▀▀░▀░▀░▀▀▀

# Title

title_fqdn="off"

# Kernel

kernel_shorthand="on"

# Distro

distro_shorthand="off"

# Show/Hide OS Architecture.

os_arch="on"

# Uptime

uptime_shorthand="on"

#  Memory

memory_percent="on"
memory_unit="gib"

#  Packages

package_managers="on"

#  $SHELL

shell_path="off"
shell_version="on"

#  CPU

speed_type="bios_limit"
speed_shorthand="off"
cpu_brand="on"
cpu_speed="on"
cpu_cores="logical"
cpu_temp="off"

#  GPU

gpu_brand="on"
gpu_type="all"

# 󰍹 Resolution

refresh_rate="on"

# Gtk Theme / Icons / Font

gtk_shorthand="off"

# Enable/Disable gtk2 Theme / Icons / Font

gtk2="on"

# Enable/Disable gtk3 Theme / Icons / Font

gtk3="on"

#  IP Address

public_ip_host="http://ident.me"
public_ip_timeout=2

# Desktop Environment

de_version="on"

# 󰋊 Disk

disk_show=('/')
disk_subtitle="mount"
disk_percent="on"

# Song

music_player="auto"
song_format="%artist% - %album% - %title%"

# Print the Artist, Album and Title on separate lines

song_shorthand="off"

mpc_args=()

# Text Colors

colors=(distro)

# Text Options

# Toggle bold text
bold="on"

# Enable/Disable Underline

underline_enabled="on"

# Underline character

underline_char="-"

# Info Separator
separator="->"

# Color Blocks

block_range=(0 15)

# Toggle color blocks

color_blocks="on"

# Color block width in spaces

block_width=3

# Color block height in lines

block_height=1

# Color Alignment

col_offset="auto"

# Progress Bars


# Bar characters

bar_char_elapsed="-"
bar_char_total="="
bar_border="on"
bar_length=15

bar_color_elapsed="distro"
bar_color_total="distro"

cpu_display="off"
memory_display="off"
battery_display="off"
disk_display="off"

#    ░█▀▄░█▀█░█▀▀░█░█░█▀▀░█▀█░█▀▄░░░█▀▀░█▀▀░▀█▀░▀█▀░▀█▀░█▀█░█▀▀░█▀▀
#    ░█▀▄░█▀█░█░░░█▀▄░█▀▀░█░█░█░█░░░▀▀█░█▀▀░░█░░░█░░░█░░█░█░█░█░▀▀█
#    ░▀▀░░▀░▀░▀▀▀░▀░▀░▀▀▀░▀░▀░▀▀░░░░▀▀▀░▀▀▀░░▀░░░▀░░▀▀▀░▀░▀░▀▀▀░▀▀▀

image_backend="ascii"

# image_source= "auto"

ascii_distro="auto"
ascii_colors=(distro)
ascii_bold="on"

# Image Options

image_loop="off"
image_size='auto'

# Thumbnail directory

thumbnail_dir="${XDG_CACHE_HOME:-${HOME}/.cache}/thumbnails/neofetch"
crop_mode="normal"
crop_offset="northwest"

gap=8
yoffset=0
xoffset=2

background_color=

# Misc Options

stdout="off"
