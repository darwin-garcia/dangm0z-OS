# ══════════════════════════════════════════════════════════
#  Fragmento para hyprland.conf (o un archivo aparte con
#  `source = ~/.config/hypr/hyprland-sidebar.conf`)
# ══════════════════════════════════════════════════════════

# Arranca el daemon de eww y abre el sidebar al iniciar sesión
exec-once = eww daemon
exec-once = sleep 1 && eww open sidebar

# Integración vía namespace (definido en windows/windows.yuck
# con :namespace "eww-sidebar"). Se usa layerrule, no windowrulev2,
# porque el sidebar vive en la capa layer-shell, no como ventana normal.
layerrule = noanim, eww-sidebar
layerrule = blur, eww-sidebar
layerrule = ignorezero, eww-sidebar
