# See https://wiki.hyprland.org/Configuring/Environment-variables/

# Cursor and Themes

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Breeze_Light
env = HYPRCURSOR_THEME,Breeze_Light

# XDG Session Portal

env = XDG_CONFIG_HOME,$HOME/.config
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# Escala

env = GDK_SCALE,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1


# Qt — modo oscuro

env = QT_QPA_PLATFORMTHEME,kde dolphin,qt5ct
env = QT_STYLE_OVERRIDE,kvantum
env = KVANTUM_THEME,ArcAuroraDark
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOW_DECORATION,1
env = QT_STYLE_OVERRIDE,Breeze
env = QT_SCALE_FACTOR,1.25

# GTK — modo oscuro
env = GTK_THEME,Breeze-Dark
env = GDK_DPI_SCALE,1.25

# Wayland
env = GDK_BACKEND,wayland,x11
