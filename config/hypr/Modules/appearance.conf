# https://wiki.hyprland.org/Configuring/Variables/#general

general {
    gaps_in = 2
    gaps_out = 4
    border_size = 4
    col.active_border = $active_border_color
    col.inactive_border = $inactive_border_color
    resize_on_border = true
    extend_border_grab_area = 15
    allow_tearing = false
    layout = dwindle
}

# ▄▀█ █▀▀ █▀ ▀█▀ █░█ █▀▀ ▀█▀ █ █▀▀  █▀ █▀▄▀█ █▀█ █▀█ ▀█▀ █░█
# █▀█ ██▄ ▄█ ░█░ █▀█ ██▄ ░█░ █ █▄▄  ▄█ █░▀░█ █▄█ █▄█ ░█░ █▀█

# https://wiki.hyprland.org/Configuring/Variables/#decoration

decoration {
    rounding = 8 
    
    shadow {
        enabled = true
        range = 16
        render_power = 8
        color = $shadow_color
        color_inactive = $shadow_color
        offset = 0 0
    } 
    
    blur {
        enabled = true
        size = 6
        passes = 4
        contrast = 1.44
        brightness = 0.85
        vibrancy = 0.45    
        vibrancy_darkness = 0.35
        noise = 0.04      
        ignore_opacity = true
        new_optimizations = on
    }

    dim_inactive = true
    dim_strength = 0.25 
    active_opacity = 0.93
    inactive_opacity = 0.86 
    fullscreen_opacity = 1.0 
}

# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    bezier = snappy, 0.22, 1.0, 0.35, 1.0
    bezier = smooth, 0.23, 1.0, 0.32, 1.0
    bezier = slide, 0.165, 0.84, 0.44, 1.0
    bezier = overshot, 0.13, 0.99, 0.29, 1.08
    bezier = macspring, 0.18, 1.08, 0.35, 1.06
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    animation = windows, 1, 3, snappy, slide
    animation = windowsIn, 1, 4, macspring, popin 85%
    animation = windowsOut, 1, 3, snappy, popin 85%
    animation = windowsMove, 1, 3, snappy
    animation = fade, 1, 4, smooth
    animation = fadeIn, 1, 3, smooth
    animation = fadeOut, 1, 2, smooth
    animation = workspaces, 1, 4, slide
    animation = layersIn,       1, 1.5, overshot, popin 80%
    animation = layersOut,      1, 1.3, md3_accel, popin 90%
    animation = layers,         1, 1.5, md3_standard
    animation = specialWorkspace, 1, 3, smooth
    animation = border, 1, 5, smooth
    animation = borderangle, 1, 100, linear, loop

}