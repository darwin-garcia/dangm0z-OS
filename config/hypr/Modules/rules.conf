# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Ventanas Flotantes (Utilidades)

windowrule {
    name = float-pavucontrol
    match:class = pavucontrol
    float = yes
    center = yes
}
windowrule {
    name = float-galculator
    match:class = galculator
    float = yes
    center = yes
}
windowrule {
    name = float-wiremix
    match:class = wiremix-float
    float = yes
    center = yes
    size = 800 500
}
windowrule {
    name = float-bluetui
    match:class = bluetui-float
    float = yes
    center = yes
    size = 800 500
}
windowrule {
    name = float-impala
    match:class = impala_float
    float = yes
    center = yes
    size = 900 600
}
windowrule {
    name = float-settings
    match:title = Preferencias
    float = yes
    center = yes
}
windowrule {
    name = float-config
    match:title = Configuración
    float = yes
    center = yes
}

# Regla en bloque para Celluloid
windowrule {
    name = Celluloid
    match:class = io.github.celluloid_player.Celluloid
    float = true
    center = true
}

# Regla en bloque para Loupe
windowrule {
    name = Image Viewer
    match:class = org.gnome.Loupe
    float = true
    center = true
}

layerrule {
    name = rofi
    match:namespace = rofi
    blur = true
    ignore_alpha = 0.5
}