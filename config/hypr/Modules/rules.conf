# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Ventanas Flotantes (Utilidades)
windowrule {
    name = float-pavucontrol
    match:class = pavucontrol
    float = yes
    center = yes
}
windowrule {
    name = float-nm
    match:class = nm-connection-editor
    float = yes
    center = yes
}
windowrule {
    name = float-blueman
    match:class = blueman-manager
    float = yes
    center = yes
}
windowrule {
    name = float-settings
    match:title = Preferencias
    float = yes
    center = yes
}
windowrule {
    name = float-config
    match:title = Configuración
    float = yes
    center = yes
}

windowrule = match:class ^(celluloid)$, float 1
windowrule = match:class ^(celluloid)$, center 1


# Rofi Blur
blurls = rofi