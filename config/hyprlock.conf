#
# пјЁпҪҷпҪҗпҪ’пҪҢпҪҒпҪҺпҪ„ by рқ“ӯрқ“Әрқ“·рқ“°рқ“¶рқ“ёрқ”ғ 

$hypr = ~/.config/hypr
$font = SF Pro Display
$font_regular = SF Pro Display
$font_bold = SF Pro Display Bold

# GENERAL
general {
  hide_cursor = false
  ignore_empty_input = true
  text_trim = true
}

# ANIMATIONS
animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

# BACKGROUND
background {
    monitor = 
    path = screenshot
    blur_passes = 2
    contrast = 0.8916
    brightness = 0.7172
    vibrancy = 0.1696
    vibrancy_darkness = 0
}

# TIME 
label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 1)
    shadow_size = 3
    shadow_color = rgb(0,0,0)
    shadow_boost = 1.2
    font_size = 100
    font_family = $font_bold 
    position = 0, -135
    halign = center
    valign = top
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A %d %B %Y"
    color = rgba(255, 255, 255, 1)
    shadow_size = 1
    font_size = 28
    font_family = $font
    position = 0, -85
    halign = center
    valign = top
}

# в”Җв”Җв”Җ CAJA DE CONTRASEГ‘A (Solo errores de teclado) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 2
    outer_color = rgb(00ccff) rgb(0055ff) 45deg
    check_color = rgba(00ff99ee) rgba(ff6633ee) 120deg
    dots_size = 0.1
    dots_spacing = 0.5
    dots_center = true
    inner_color = rgba(0, 0, 0, 1)
    font_color = rgba(200, 200, 200, 1)
    fade_on_empty = false
    font_family = JetBrains Mono Nerd Font Mono
    hide_input = false
    position = 0, -160
    halign = center
    valign = center
    zindex = 10
    
    fail_text = $PAMFAIL ($ATTEMPTS)
    placeholder_text = <span foreground="##cdd6f4">пҖҮ $USER</span>
}

# в”Җв”Җв”Җ FINGERPRINT (Messages Section) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

# Fingerprint Status (Ex: "Scan Fingerprint to unlock")
label {
    monitor =
    text = $FPRINTPROMPT
    color = rgba(255, 255, 255, 0.75)
    font_size = 14
    font_family = $font
    position = 0, -270
    halign = center
    valign = center
}

# Error or fail user fingerprint
label {
    monitor =
    text = $FPRINTFAIL
    color = rgba(255, 80, 80, 1)
    font_size = 14
    font_family = $font
    position = 0, -305
    halign = center
    valign = center
}

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

# AUTHENTICATION
auth {
    pam {
        enabled = true
    }
    fingerprint {
        enabled = true
        retry_delay = 250
        present_message = у°Ҳ·  Scanning...
        ready_message = у°Ҳ·  Scan Fingerprint to unlock.
    }
}

# LEGEND (Caps Lock)
label {
    monitor =
    text = cmd[update:500] awk '{print "у°ҳІ  Caps Lock "($0?"on":"off"); exit}' /sys/class/leds/input*::capslock/brightness
    color = rgba(255,255,255,0.75)
    font_size = 14
    font_family = $font
    position = 0, -250
    halign = center
    valign = bottom
}

# INFORMATION
label {
    monitor =
    text = cmd[update:1000] $hypr/Scripts/infonlock.sh
    color = rgba(255, 255, 255, 1)
    font_size = 14
    font_family = $font
    position = -20, -20
    halign = right
    valign = top
}
label {
   monitor = 
   text = cmd[update:5000] $hypr/Scripts/network.sh
   color = rgba(255, 255, 255 ,1)
   font_size = 14
   font_family = $font
   position = -80, -20
   halign = right
   valign = top
}

# BOTTOM MENU (Suspend)
label {
   monitor =
   text = у°Ө„
   color = rgba(255, 255, 255, 0.75)
   shadow_size = 5
   shadow_color = rgba(0, 0, 0, 0.9)
   shadow_boost = 1.6
   font_size = 36
   font_family = JetBrains Mono Nerd Font
   onclick = systemctl suspend
   position = 0, 65
   halign = center
   valign = bottom
}

label {
   monitor =
   text = Suspend
   color = rgba(255, 255, 255, 0.45)
   shadow_size = 3
   shadow_color = rgba(0, 0, 0, 0.8)
   shadow_boost = 1.2
   font_size = 12
   font_family = $font
   position = 0, 40
   halign = center
   valign = bottom
}